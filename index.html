<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Mohamed & Sara - After Party</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --gold:#d4af37;
    --light-gold:#fff2b3;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Montserrat',sans-serif;
    background:#000;
    color:#fff;
    position:relative;
}

/* =========================
   BACKGROUND
========================= */

.main-bg{
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.92)),
    url('https://r.jina.ai/i/274488313437435f99147171e29e9652');

    background-size:cover;
    background-position:center;

    z-index:-5;

    transform:scale(1.08);

    animation:bgMove 18s ease-in-out infinite alternate;
}

@keyframes bgMove{
    from{
        transform:scale(1.08) translateY(0);
    }

    to{
        transform:scale(1.15) translateY(-10px);
    }
}

/* =========================
   GOLD LIGHTS
========================= */

.glow{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(212,175,55,.22),
    transparent 70%);

    filter:blur(40px);

    z-index:-4;

    animation:moveGlow 10s ease-in-out infinite alternate;
}

.glow.one{
    top:-120px;
    left:-120px;
}

.glow.two{
    bottom:-150px;
    right:-120px;
    animation-delay:4s;
}

@keyframes moveGlow{
    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(40px,-30px);
    }
}

/* =========================
   HEARTS
========================= */

#hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-3;
}

.heart{
    position:absolute;
    bottom:-20px;
    color:var(--gold);
    opacity:0;

    animation:floatUp linear forwards;

    text-shadow:0 0 10px rgba(212,175,55,.8);
}

@keyframes floatUp{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    15%{
        opacity:.8;
    }

    100%{
        transform:
        translateY(-120vh)
        scale(1.8)
        rotate(360deg);

        opacity:0;
    }
}

/* =========================
   MAIN WRAPPER
========================= */

.wrapper{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px 18px;
}

.card{

    width:100%;
    max-width:460px;

    position:relative;

    background:rgba(12,12,12,.75);

    border:1px solid rgba(212,175,55,.45);

    border-radius:32px;

    padding:50px 28px;

    backdrop-filter:blur(14px);

    overflow:hidden;

    box-shadow:
    0 0 50px rgba(212,175,55,.15),
    inset 0 0 40px rgba(255,255,255,.03);

    animation:cardFade 1.4s ease;
}

@keyframes cardFade{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* BORDER SHINE */

.card::before{

    content:'';

    position:absolute;
    inset:-2px;

    border-radius:32px;

    padding:1px;

    background:
    linear-gradient(
    130deg,
    transparent,
    rgba(255,255,255,.7),
    transparent);

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;
            mask-composite:exclude;

    animation:shine 4s linear infinite;
}

@keyframes shine{

    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(100%);
    }
}

/* =========================
   TEXT
========================= */

.tag{
    text-align:center;

    letter-spacing:6px;

    font-size:12px;

    color:var(--gold);

    margin-bottom:12px;

    font-family:'Cinzel',serif;
}

.title{

    text-align:center;

    font-family:'Great Vibes',cursive;

    font-size:clamp(58px, 13vw, 80px);

    background:
    linear-gradient(
    to bottom,
    var(--light-gold),
    var(--gold));

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    line-height:1;
}

.line{

    width:120px;
    height:1px;

    background:
    linear-gradient(
    to right,
    transparent,
    var(--gold),
    transparent);

    margin:18px auto 26px;
}

.names{

    text-align:center;

    font-family:'Great Vibes',cursive;

    font-size:clamp(42px,10vw,60px);

    color:var(--light-gold);

    line-height:1.2;

    animation:nameGlow 4s ease-in-out infinite;
}

@keyframes nameGlow{

    0%,100%{
        transform:scale(1);

        text-shadow:
        0 0 10px rgba(212,175,55,.25);
    }

    50%{
        transform:scale(1.03);

        text-shadow:
        0 0 15px rgba(212,175,55,.7),
        0 0 35px rgba(212,175,55,.4);
    }
}

.and{

    font-size:22px;

    font-family:'Montserrat',sans-serif;

    color:var(--gold);
}

/* =========================
   DETAILS
========================= */

.details{

    margin-top:35px;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    border-top:1px solid rgba(212,175,55,.25);

    border-bottom:1px solid rgba(212,175,55,.25);
}

.detail{

    padding:22px 10px;

    text-align:center;

    position:relative;
}

.detail:not(:last-child)::after{

    content:'';

    position:absolute;

    right:0;
    top:50%;

    transform:translateY(-50%);

    width:1px;
    height:50%;

    background:rgba(212,175,55,.18);
}

.detail span{

    display:block;

    color:var(--gold);

    font-size:10px;

    letter-spacing:3px;

    margin-bottom:10px;
}

.detail p{

    font-size:12px;

    font-weight:600;

    line-height:1.6;
}

/* =========================
   BUTTON
========================= */

.location-btn{

    margin:30px auto 16px;

    width:max-content;

    display:flex;
    align-items:center;
    gap:10px;

    text-decoration:none;

    padding:15px 28px;

    border-radius:100px;

    color:var(--gold);

    border:1px solid rgba(212,175,55,.5);

    letter-spacing:2px;

    font-size:11px;

    font-weight:600;

    transition:.4s;

    position:relative;

    overflow:hidden;
}

.location-btn::before{

    content:'';

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.2),
    transparent);

    transform:translateX(-100%);
}

.location-btn:hover::before{

    transform:translateX(100%);

    transition:1s;
}

.location-btn:hover{

    background:var(--gold);

    color:#000;

    box-shadow:0 0 25px rgba(212,175,55,.7);

    transform:translateY(-4px);
}

/* =========================
   PRICE
========================= */

.price{

    text-align:center;

    color:var(--light-gold);

    letter-spacing:3px;

    font-size:13px;

    font-weight:700;

    margin-top:10px;
}

/* =========================
   DIVIDER
========================= */

.mini-divider{

    width:140px;

    height:1px;

    margin:22px auto;

    background:
    linear-gradient(
    to right,
    transparent,
    rgba(212,175,55,.8),
    transparent
    );
}

/* =========================
   IMAGE
========================= */

.cheers{

    display:block;

    width:115px;

    margin:28px auto 12px;

    filter:
    drop-shadow(0 0 10px rgba(212,175,55,.8))
    drop-shadow(0 0 25px rgba(212,175,55,.3));

    animation:floatGlass 4s ease-in-out infinite;
}

@keyframes floatGlass{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-12px);
    }
}

/* =========================
   FOOTER
========================= */

.footer-text{

    text-align:center;

    font-family:'Great Vibes',cursive;

    font-size:30px;

    color:var(--light-gold);

    margin-top:10px;

    text-shadow:
    0 0 14px rgba(212,175,55,.35);
}

.extra-text{

    margin-top:10px;

    text-align:center;

    font-size:12px;

    letter-spacing:3px;

    line-height:2;

    color:#f5e7a1;

    font-weight:500;

    text-transform:uppercase;

    opacity:.9;
}

/* =========================
   MOBILE
========================= */

@media(max-width:480px){

    .card{
        padding:45px 20px;
    }

    .detail p{
        font-size:11px;
    }

    .footer-text{
        font-size:26px;
    }

    .extra-text{
        font-size:11px;
        letter-spacing:2px;
    }
}

</style>
</head>

<body>

<div class="main-bg"></div>

<div class="glow one"></div>
<div class="glow two"></div>

<div id="hearts"></div>

<div class="wrapper">

    <div class="card">

        <div class="tag">
            ENGAGEMENT PARTY
        </div>

        <h1 class="title">
            After Party
        </h1>

        <div class="line"></div>

        <div class="names">

            Mohamed Fawzy

            <br>

            <span class="and">&</span>

            <br>

            Sara Sorour

        </div>

        <div class="details">

            <div class="detail">
                <span>DATE</span>
                <p>29 MAY 2026</p>
            </div>

            <div class="detail">
                <span>TIME</span>
                <p>08:30 PM</p>
            </div>

            <div class="detail">
                <span>LOCATION</span>
                <p>NEW CAIRO</p>
            </div>

        </div>

        <a
        href="https://maps.app.goo.gl/YourActualGatzLink"
        target="_blank"
        class="location-btn">

            📍 OPEN LOCATION

        </a>

        <div class="price">
            MINIMUM CHARGE : 850 EGP
        </div>

        <div class="mini-divider"></div>

        

        <div class="footer-text">
            Your presence is our true celebration ✨
        </div>

        <div class="mini-divider"></div>

        <div class="extra-text">

            GOOD MUSIC. GREAT COMPANY.
            <br>

            UNFORGETTABLE MEMORIES.
            <br>

            We can't wait to celebrate with you!

        </div>

    </div>

</div>

<script>

const heartsContainer =
document.getElementById("hearts");

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random() * 100 + "vw";

    heart.style.fontSize =
    (Math.random() * 16 + 10) + "px";

    heart.style.animationDuration =
    (Math.random() * 4 + 4) + "s";

    heart.style.opacity =
    Math.random();

    heartsContainer.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,120);

</script>

</body>
</html>
